<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        if (window.location.protocol === "file:" && !window.location.pathname.replace(/\\/g, "/").includes("/dist/")) {
            const page = window.location.pathname.split(/[\\/]/).pop() || "index.html";
            window.location.replace(`dist/${page}${window.location.search}${window.location.hash}`);
        }
    </script>
    <title>Virtual - NEKINGX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        window.tailwind = window.tailwind || {};
        window.tailwind.config = { corePlugins: { preflight: false } };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="min-h-screen overflow-x-hidden" data-header-type="inner">
    <main class="crash-page iframe-preview-page virtual-page auth-logged-out">
        <div data-include="/components/header.html"></div>
        <section class="iframe-preview-content" aria-label="Virtual preview">
            <img src="assets/figma-export/neking/virtual.jpg" alt="Virtual game preview">
        </section>
        <button class="floating-chat" aria-label="Chat"><span></span></button>
        <div data-include="/components/mobile-bottom-nav.html"></div>
    </main>
    <script src="/js/include.js"></script>
    <script src="/js/main.js"></script>
</body>

</html>
