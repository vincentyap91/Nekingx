<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEKINGX Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Geologica:wght@600;700;800&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="auth-page-body auth-register-page">
    <main class="auth-page" aria-label="NEKINGX authentication">
        <a class="auth-back" href="index.html" aria-label="Back">&lsaquo;</a>
        <section class="auth-card">
            <div class="auth-form-panel">
                <a class="auth-logo" href="index.html"><img src="../assets/figma-export/neking/live-logo.webp" alt="NEKINGX"></a>
                <h1>Welcome Back</h1>
                <nav class="auth-tabs" aria-label="Auth tabs">
                    <a class="auth-tab auth-tab-login" href="login.html">Login</a>
                    <a class="auth-tab auth-tab-register" href="register.html">Register</a>
                </nav>

                <form class="auth-form login-form">
                    <label class="auth-input phone-input">
                        <img src="../assets/figma-export/neking/auth-flag.webp" alt="">
                        <strong>+234</strong>
                        <input type="tel" placeholder="Please enter phone number">
                    </label>
                    <label class="auth-input">
                        <img src="../assets/figma-export/neking/auth-lock.png" alt="">
                        <input type="password" placeholder="Please enter password">
                        <img class="auth-input-action" src="../assets/figma-export/neking/auth-eye-slash.png" alt="">
                    </label>
                    <a class="forgot-link" href="#">Forgot <span>password ?</span></a>
                    <button class="auth-submit" type="submit">Login</button>
                </form>

                <form class="auth-form register-form">
                    <label class="auth-input phone-input">
                        <img src="../assets/figma-export/neking/auth-flag.webp" alt="">
                        <strong>+234</strong>
                        <input type="tel" placeholder="Please enter phone number">
                    </label>
                    <label class="auth-input code-input">
                        <img src="../assets/figma-export/neking/auth-shield-tick.png" alt="">
                        <input type="text" placeholder="Please enter the verification code">
                        <button type="button">Send</button>
                    </label>
                    <label class="auth-input">
                        <img src="../assets/figma-export/neking/auth-lock.png" alt="">
                        <input type="password" placeholder="Please enter password">
                    </label>
                    <label class="auth-input">
                        <img src="../assets/figma-export/neking/auth-lock.png" alt="">
                        <input type="password" placeholder="Please confirm password">
                    </label>
                    <label class="auth-input">
                        <img src="../assets/figma-export/neking/auth-hi.png" alt="">
                        <input type="text" placeholder="Please enter invite code">
                    </label>
                    <label class="auth-input select-input">
                        <img src="../assets/figma-export/neking/auth-bank.webp" alt="">
                        <input type="text" placeholder="Please select bank" readonly>
                        <span>&#8964;</span>
                    </label>
                    <label class="auth-input">
                        <img src="../assets/figma-export/neking/auth-bank-no.webp" alt="">
                        <input type="text" placeholder="Please enter bank account number">
                    </label>
                    <label class="auth-input">
                        <img src="../assets/figma-export/neking/auth-bank-name.webp" alt="">
                        <input type="text" placeholder="Please enter bank account name">
                    </label>
                    <label class="auth-check">
                        <input type="checkbox">
                        <span>I confirm that I meet the age requirement and agree to the terms and privacy policy.</span>
                    </label>
                    <button class="auth-submit" type="submit">Register</button>
                </form>
            </div>
            <aside class="auth-image" aria-hidden="true"></aside>
        </section>
        <button class="auth-chat" aria-label="Chat"></button>
    </main>
    <script src="../js/main.js"></script>
</body>

</html>
