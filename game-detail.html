<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        if (window.location.protocol === "file:" && !window.location.pathname.replace(/\\/g, "/").includes("/dist/")) {
            const page = window.location.pathname.split(/[\\/]/).pop() || "index.html";
            window.location.replace(`dist/${page}${window.location.search}${window.location.hash}`);
        }
    </script>
    <title>Game Detail - NEKINGX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        window.tailwind = window.tailwind || {};
        window.tailwind.config = { corePlugins: { preflight: false } };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="min-h-screen overflow-x-hidden">
    <main class="game-detail-page auth-logged-out">
        <div data-include="/components/header.html"></div>
        <section class="game-detail-content">
            <div class="game-detail-bar">
                <div class="game-detail-title">
                    <a href="crash.html" aria-label="Back to crash games">&lsaquo;</a>
                    <h1 data-game-title>Aviator</h1>
                </div>
                <a class="game-detail-launch" href="https://www.nekingx.com/" target="_blank" rel="noopener">Launch Platform</a>
            </div>
            <figure class="game-platform-preview">
                <img src="assets/figma-export/neking/game-detail-preview.png" alt="Platform game detail preview">
            </figure>
        </section>
    </main>
    <script src="/js/include.js"></script>
    <script src="/js/main.js"></script>
</body>

</html>
